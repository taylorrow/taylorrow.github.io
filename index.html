<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>taylorrow</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f7f4ec;
        color: #182033;
      }

      main {
        padding: 32px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 8vw, 64px);
        line-height: 1.05;
      }

      p {
        margin: 16px 0 0;
        font-size: clamp(16px, 3vw, 22px);
        color: #5c6474;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Website in progress</h1>
      <p>This developer website is currently under construction.</p>
    </main>
  </body>
</html>
